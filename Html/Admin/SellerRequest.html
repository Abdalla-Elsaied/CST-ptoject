<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container py-5">

    <h2 class="mb-4">Seller Requests</h2>

    <div class="mb-3">

        <button id="loadRequestsBtn" class="btn btn-primary">
            View Pending Requests
        </button>

        <button id="approveSelectedBtn" class="btn btn-success">
            Submit Approvals
        </button>

    </div>


    <table class="table table-bordered" id="requestsTable">

        <thead class="table-dark">
            <tr>
                <th>Select</th>
                <th>Store</th>
                <th>City</th>
                <th>Category</th>
                <th>Phone</th>
                <th>Payment</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>


    <script type="module">

        import {
            GetAllCustomerToApproved,
            AcceptCustomerSellerRequest,
            getCurrentUser,
            requireRole,
            ROLES
        } from "/JS/Core/Auth.js";

        //requireRole([ROLES.ADMIN]);

        const tableBody = document.querySelector("#requestsTable tbody");
        const loadBtn = document.getElementById("loadRequestsBtn");
        const approveBtn = document.getElementById("approveSelectedBtn");

        let requests = [];

        loadBtn.addEventListener("click", () => {

            tableBody.innerHTML = "";

            requests = GetAllCustomerToApproved();

            if (requests.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center">No pending requests</td></tr>`;
                return;
            }

            requests.forEach(req => {

                const row = document.createElement("tr");

                row.innerHTML = `
        <td>
            <input type="checkbox" class="request-check" value="${req.id}">
        </td>

        <td>${req.storeName}</td>
        <td>${req.city}</td>
        <td>${req.category}</td>
        <td>${req.phone}</td>
        <td>${req.paymentMethod}</td>
        `;

                tableBody.appendChild(row);

            });

        });


        approveBtn.addEventListener("click", () => {

            const admin = getCurrentUser();

            const selected = document.querySelectorAll(".request-check:checked");

            if (selected.length === 0) {
                alert("Select at least one request");
                return;
            }
            console.log("Selected request IDs:", Array.from(selected).map(c => c.value));
            console.log("Admin approving:", admin);

            selected.forEach(check => {

                const requestId = check.value;
                console.log("Approving request ID:", requestId);

                AcceptCustomerSellerRequest(requestId);

            });

            alert("Selected users approved as sellers!");

            loadBtn.click();

        });

    </script>

</body>

</html>
