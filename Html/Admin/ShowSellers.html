<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Sellers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/CSS/Admin/AddSeller.css">
</head>

<body>
    <div class="page-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h1>All Sellers</h1>
                <p>View and manage all registered sellers on the platform.</p>
            </div>
            <a href="../../Html/Admin/AddSeller.html" class="btn btn-light fw-medium">+ New Seller</a>
        </div>
    </div>

    <div class="container mt-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="sellersTable">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone Number</th>
                        <th>Store Name</th>
                        <th>Store Description</th>
                        <th>City</th>
                        <th>Payment Method</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="sellersBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Update Modal -->
    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Update Seller</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="editFullName">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="editEmail">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="editPhone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label ">Store Name</label>
                            <input type="text" class="form-control" id="editStoreName">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" id="editCity">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Payment Method</label>
                            <select class="form-select" id="editPaymentMethod">
                                <option>Bank Transfer</option>
                                <option>Vodafone Cash</option>
                                <option>InstaPay</option>
                                <option>PayPal</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label ">Store Description</label>
                            <textarea class="form-control" id="editDescription" rows="3"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success my-2" onclick="saveUpdate()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/JS/Admin/ShowSeller.js"></script>
</body>

</html>
