<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Product View</title>
<link rel="stylesheet" href="/CSS/ProductViewPage.css">
</head>
<body>

<div class="card">

  <div class="images">
    <img id="mainImage"
    src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-pro-1.jpg"
    class="main-img">

    <div class="thumbs">
      <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-pro-1.jpg">
      <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-pro-2.jpg">
      <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-pro-3.jpg">
    </div>
  </div>

  <div class="details">
    <h2>iPhone 15 Pro Max</h2>

    <div class="price">
      $999
      <span class="old">$1199</span>
      <span class="discount">17%</span>
    </div>

    <p class="description">
      A17 Pro chip, Titanium design, Pro camera system.
    </p>

    <div class="sizes">
      <button>128GB</button>
      <button>256GB</button>
      <button>512GB</button>
      <button>1TB</button>
    </div>

    <div class="cart">
      <div class="quantity">
        <button id="minus">-</button>
        <input type="text" id="qty" value="1">
        <button id="plus">+</button>
      </div>

      <button class="add-btn">Add to Cart</button>
    </div>
  </div>

</div>

<script src="/JS/ProductViewPage.js">



</script>

</body>
</html>
