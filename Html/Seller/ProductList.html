<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product List</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/CSS/Seller/ProductList.css">
</head>
<body>
<div class="header">
  <div class="title">Product List</div>
  <button class="btn" onclick="goToAddProductPage()">+ Add Product</button>
</div>

<div class="stats">
  <div class="card"><h4>Total Products</h4><div class="val" id="totalProducts"></div></div>
  <div class="card"><h4>In Stock</h4><div class="val" id="inStock"></div></div>
  <div class="card"><h4>Low Stock</h4><div class="val" id="lowStock"></div></div>
  <div class="card"><h4>Out Of Stock</h4><div class="val" id="outStock"></div></div>
</div>

<div class="filters">
  <div class="tabs">
    <div class="tab active" onclick="filterBy('all', this)">All</div>
    <div class="tab" onclick="filterBy('In Stock', this)">In Stock</div>
    <div class="tab" onclick="filterBy('Low Stock', this)">Low Stock</div>
    <div class="tab" onclick="filterBy('Out of Stock', this)">Out of Stock</div>
  </div>
  <input class="search" placeholder="Search product..." onkeyup="searchProduct(this.value)">
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>SKU</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="pagination" id="pagination"></div>

<div class="modal" id="productDetailsModal" onclick="closeProductDetails(event)">
  <div class="modal-content product-details" onclick="event.stopPropagation()">
    <h3 id="detailName">Product Details</h3>
    <img id="detailImage" class="detail-image" alt="Product image">
    <p><strong>Date:</strong> <span id="detailDate">-</span></p>
    <p><strong>Views:</strong> <span id="detailViews">0</span></p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeProductDetails()">Close</button>
    </div>
  </div>
</div>

<script src="/JS/Seller/ProductList.js"></script>
</body>
</html>
