<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/CSS/Seller/OrderManagement.css">
</head>

<body>

<div class="container">

<div class="header">
<div class="title">Order List</div>
<button class="btn" onclick="openModal()">+ Add Order</button>
</div>

<div class="cards">
<div class="card">
<h4>Total Orders</h4>
<div class="value" id="totalOrders"></div>
</div>

<div class="card">
<h4>New Orders</h4>
<div class="value green" id="newOrders"></div>
</div>

<div class="card">
<h4>Completed Orders</h4>
<div class="value green" id="completedOrders"></div>
</div>

<div class="card">
<h4>Canceled Orders</h4>
<div class="value red" id="cancelOrders"></div>
</div>
</div>

<div class="filters">

<div class="tabs">
<div class="tab active" onclick="filterStatus('all')">All</div>
<div class="tab" onclick="filterStatus('Delivered')">Completed</div>
<div class="tab" onclick="filterStatus('Pending')">Pending</div>
<div class="tab" onclick="filterStatus('Cancelled')">Canceled</div>
</div>

<input class="search" placeholder="Search order..." onkeyup="searchOrder(this.value)">

</div>

<div class="table-wrap">
<table>

<thead>
<tr>
<th>No</th>
<th>Order Id</th>
<th>Product</th>
<th>Date</th>
<th>Price</th>
<th>Payment</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
</div>

<div class="pagination" id="pagination"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<h3>Add Order</h3>

<input id="product" placeholder="Product name">

<input id="price" type="number" placeholder="Price">

<select id="payment">
<option>Paid</option>
<option>Unpaid</option>
</select>

<select id="status">
<option>Delivered</option>
<option>Pending</option>
<option>Shipped</option>
<option>Cancelled</option>
</select>

<div class="modal-actions">
<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
<button class="btn" onclick="addOrder()">Save</button>
</div>

</div>
</div>

<script src="/JS/Seller/OrderManagement.js"></script>

</div>

</body>
</html>
