<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--green:#22c55e;
--green-dark:#16a34a;
--green-light:#ecfdf5;
--text-primary:#1f2937;
--text-sec:#6b7280;
--card-bg:#ffffff;
--page-bg:#f8fafc;
--border:#e5e7eb;
--danger:#ef4444;
--warning:#f59e0b;
--info:#0ea5e9;
--radius:12px;
--shadow:0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
--shadow-md:0 4px 16px rgba(0,0,0,.09);
}
body.dark{
--text-primary:#f1f5f9;
--text-sec:#94a3b8;
--card-bg:#1e293b;
--page-bg:#0f172a;
--border:#334155;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans',sans-serif;
}
body{
background:var(--page-bg);
padding:28px 16px;
color:var(--text-primary);
min-height:100vh;
}
.container{
max-width:1200px;
margin:0 auto;
padding:0;
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
gap:10px;
flex-wrap:wrap;
}
.title{
font-size:1.4rem;
font-weight:700;
color:var(--text-primary);
}
.btn{
background:var(--green);
border:none;
color:white;
padding:9px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:.88rem;
transition:background .18s ease;
}
.btn:hover{
background:var(--green-dark);
}
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-bottom:22px;
}
.card{
background:var(--card-bg);
padding:20px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--border);
}
.card h4{
font-size:.75rem;
color:var(--text-sec);
margin-bottom:8px;
font-weight:700;
text-transform:uppercase;
letter-spacing:.05em;
}
.card .value{
font-size:2rem;
font-weight:800;
color:var(--text-primary);
}
.green{color:var(--green)}
.red{color:var(--danger)}
.filters{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
gap:12px;
flex-wrap:wrap;
}
.tabs{
display:flex;
background:var(--card-bg);
border-radius:8px;
overflow:hidden;
border:1.5px solid var(--border);
}
.tab{
padding:8px 14px;
cursor:pointer;
font-size:.85rem;
font-weight:600;
color:var(--text-sec);
transition:background .2s ease,color .2s ease;
}
.tab.active{
background:var(--green-light);
color:var(--green-dark);
}
.search{
border:1.5px solid var(--border);
padding:8px 12px;
border-radius:999px;
width:250px;
outline:none;
font-size:.875rem;
background:var(--card-bg);
transition:border-color .2s ease,box-shadow .2s ease;
}
.search:focus{
border-color:var(--green);
box-shadow:none;
}
.table-wrap{
overflow-x:auto;
border-radius:var(--radius);
}
table{
width:100%;
background:var(--card-bg);
border-radius:var(--radius);
overflow:hidden;
border-collapse:collapse;
box-shadow:var(--shadow);
border:1px solid var(--border);
min-width:760px;
}
thead{
background:var(--green-light);
}
th,td{
padding:10px 14px;
font-size:.85rem;
border-bottom:1px solid var(--border);
text-align:left;
}
th{
font-weight:700;
color:var(--text-sec);
font-size:.72rem;
text-transform:uppercase;
letter-spacing:.04em;
}
.status{
font-weight:600;
}
.paid{color:var(--green)}
.unpaid{color:var(--danger)}
.delivered{color:var(--green)}
.pending{color:var(--warning)}
.shipped{color:var(--info)}
.cancelled{color:var(--danger)}
.pagination{
display:flex;
justify-content:center;
gap:8px;
margin-top:16px;
flex-wrap:wrap;
}
.page{
padding:8px 12px;
background:var(--card-bg);
border-radius:8px;
cursor:pointer;
font-weight:600;
min-width:38px;
text-align:center;
border:1.5px solid var(--border);
color:var(--text-sec);
transition:background .2s ease,color .2s ease,transform .2s ease;
}
.page.active{
background:var(--green-light);
border-color:var(--green);
color:var(--green-dark);
}
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.3);
display:none;
align-items:center;
justify-content:center;
padding:14px;
z-index:5;
}
.modal-content{
background:var(--card-bg);
padding:20px;
border-radius:var(--radius);
width:100%;
max-width:360px;
border:1px solid var(--border);
box-shadow:var(--shadow-md);
}
.modal-content h3{
margin-bottom:12px;
font-size:1.05rem;
color:var(--text-primary);
}
.modal-content input,select{
width:100%;
margin-bottom:10px;
padding:10px;
border:1.5px solid var(--border);
border-radius:8px;
font-size:.875rem;
outline:none;
}
.modal-content input:focus,
.modal-content select:focus{
border-color:var(--green);
box-shadow:none;
}
.modal-actions{
display:flex;
justify-content:flex-end;
gap:8px;
margin-top:4px;
}
.btn-secondary{
background:transparent;
color:var(--text-sec);
border:1.5px solid var(--border);
box-shadow:none;
}
.btn-secondary:hover{
background:var(--green-light);
color:var(--green-dark);
border-color:var(--green);
}
@media (max-width:992px){
.cards{
grid-template-columns:repeat(2,1fr);
}
}
@media (max-width:680px){
body{
padding:16px 10px;
}
.container{
padding:16px;
border-radius:14px;
}
.title{
font-size:24px;
}
.cards{
grid-template-columns:1fr;
}
.tabs{
width:100%;
}
.tab{
flex:1;
text-align:center;
padding:10px 8px;
font-size:13px;
}
.search{
width:100%;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="title">Order List</div>
<button class="btn" onclick="openModal()">+ Add Order</button>
</div>

<div class="cards">
<div class="card">
<h4>Total Orders</h4>
<div class="value" id="totalOrders"></div>
</div>

<div class="card">
<h4>New Orders</h4>
<div class="value green" id="newOrders"></div>
</div>

<div class="card">
<h4>Completed Orders</h4>
<div class="value green" id="completedOrders"></div>
</div>

<div class="card">
<h4>Canceled Orders</h4>
<div class="value red" id="cancelOrders"></div>
</div>
</div>

<div class="filters">

<div class="tabs">
<div class="tab active" onclick="filterStatus('all')">All</div>
<div class="tab" onclick="filterStatus('Delivered')">Completed</div>
<div class="tab" onclick="filterStatus('Pending')">Pending</div>
<div class="tab" onclick="filterStatus('Cancelled')">Canceled</div>
</div>

<input class="search" placeholder="Search order..." onkeyup="searchOrder(this.value)">

</div>

<div class="table-wrap">
<table>

<thead>
<tr>
<th>No</th>
<th>Order Id</th>
<th>Product</th>
<th>Date</th>
<th>Price</th>
<th>Payment</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>
</div>

<div class="pagination" id="pagination"></div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<h3>Add Order</h3>

<input id="product" placeholder="Product name">

<input id="price" type="number" placeholder="Price">

<select id="payment">
<option>Paid</option>
<option>Unpaid</option>
</select>

<select id="status">
<option>Delivered</option>
<option>Pending</option>
<option>Shipped</option>
<option>Cancelled</option>
</select>

<div class="modal-actions">
<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
<button class="btn" onclick="addOrder()">Save</button>
</div>

</div>
</div>

<script>

const pageSize = 8
let page = 1
let filter="all"
let search=""

let orders = JSON.parse(localStorage.getItem("orders"))

if(!orders){

orders=[
{product:"Wireless Bluetooth Headphones",price:49.99,payment:"Paid",status:"Delivered"},
{product:"Men's T-Shirt",price:14.99,payment:"Unpaid",status:"Pending"},
{product:"Men's Leather Wallet",price:49.99,payment:"Paid",status:"Delivered"},
{product:"Memory Foam Pillow",price:39.99,payment:"Paid",status:"Shipped"},
{product:"Adjustable Dumbbells",price:14.99,payment:"Unpaid",status:"Pending"},
{product:"Coffee Maker",price:79.99,payment:"Unpaid",status:"Cancelled"},
{product:"Casual Baseball Cap",price:49.99,payment:"Paid",status:"Delivered"},
{product:"Full HD Webcam",price:39.99,payment:"Paid",status:"Delivered"},
{product:"Smart LED Bulb",price:79.99,payment:"Unpaid",status:"Delivered"},
{product:"Men's T-Shirt",price:14.99,payment:"Unpaid",status:"Delivered"}
]

localStorage.setItem("orders",JSON.stringify(orders))

}

function save(){
localStorage.setItem("orders",JSON.stringify(orders))
}

function updateCards(){

document.getElementById("totalOrders").innerText=orders.length

document.getElementById("completedOrders").innerText=
orders.filter(o=>o.status=="Delivered").length

document.getElementById("cancelOrders").innerText=
orders.filter(o=>o.status=="Cancelled").length

document.getElementById("newOrders").innerText=
orders.filter(o=>o.status=="Pending").length

}

function render(){

let data=orders

if(filter!="all")
data=data.filter(o=>o.status==filter)

if(search)
data=data.filter(o=>o.product.toLowerCase().includes(search))

let start=(page-1)*pageSize
let paginated=data.slice(start,start+pageSize)

let html=""

paginated.forEach((o,i)=>{

html+=`
<tr>
<td>${start+i+1}</td>
<td>#ORD${1000+i}</td>
<td>${o.product}</td>
<td>01-01-2025</td>
<td>${o.price}</td>
<td class="${o.payment=='Paid'?'paid':'unpaid'}">${o.payment}</td>
<td class="status ${o.status.toLowerCase()}">${o.status}</td>
</tr>
`

})

document.getElementById("tableBody").innerHTML=html

renderPagination(data.length)

updateCards()

}

function renderPagination(total){

let pages=Math.ceil(total/pageSize)

let html=""

for(let i=1;i<=pages;i++){

html+=`<div class="page ${i==page?'active':''}" onclick="goto(${i})">${i}</div>`

}

document.getElementById("pagination").innerHTML=html

}

function goto(p){
page=p
render()
}

function filterStatus(s){

filter=s
page=1

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
event.target.classList.add("active")

render()

}

function searchOrder(v){
search=v.toLowerCase()
render()
}

function openModal(){
document.getElementById("modal").style.display="flex"
}

function closeModal(){
document.getElementById("modal").style.display="none"
clearOrderForm()
}

function clearOrderForm(){
document.getElementById("product").value=""
document.getElementById("price").value=""
document.getElementById("payment").value="Paid"
document.getElementById("status").value="Delivered"
}

function addOrder(){

let product=document.getElementById("product").value
let price=document.getElementById("price").value
let payment=document.getElementById("payment").value
let status=document.getElementById("status").value

if(!product.trim() || price==="") return

orders.unshift({product,price,payment,status})

save()

closeModal()

render()

}

render()

</script>

</div>

</body>
</html>
