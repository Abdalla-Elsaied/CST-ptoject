<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Arrivals – DEALPORT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../CSS/Customer/CustomerHomePage.css"/>
  <link rel="stylesheet" href="../../CSS/Customer/profile.css"/>
</head>
<body class="profile-page-body">

<!-- ===== NAVBAR ===== -->
<header class="navbar-top sticky-top">
  <div class="container-fluid px-3 px-lg-4">
    <div class="d-flex align-items-center gap-3 gap-lg-4 py-2">

      <!-- Logo -->
      <a href="CustomerHomePage.html" class="logo-brand text-decoration-none flex-shrink-0">
        <span class="logo-deal">DEAL</span><span class="logo-port"><i class="bi bi-shop"></i>RT</span>
      </a>

      <!-- Search Bar -->
      <div class="search-wrapper flex-grow-1">
        <div class="input-group search-group">
          <input type="text" class="form-control search-input" id="naSearch"
                 placeholder="Search new arrivals..."/>
          <button class="btn btn-search" type="button" id="naSearchBtn">
            <i class="bi bi-search"></i>
            <span class="d-none d-sm-inline"> Search</span>
          </button>
        </div>
      </div>

      <!-- Right Icons -->
      <div class="nav-icons d-flex align-items-center gap-2 gap-lg-3 flex-shrink-0">

        <!-- Wishlist -->
        <button class="nav-icon-btn d-none d-md-flex flex-column align-items-center border-0 bg-transparent position-relative"
                id="wishlistNavBtn" title="Wishlist">
          <i class="bi bi-heart"></i>
          <span class="wishlist-nav-badge d-none">0</span>
          <span>Wishlist</span>
        </button>

        <!-- Account dropdown -->
        <div class="dropdown">
          <button class="nav-icon-btn d-none d-md-flex flex-column align-items-center border-0 bg-transparent"
                  id="accountNavBtn" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-person"></i>
            <span id="accountNavLabel">Account</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end account-dropdown" id="accountDropdownMenu"></ul>
        </div>

        <!-- Cart -->
        <a href="Cart.html" class="nav-icon-btn d-flex flex-column align-items-center position-relative text-decoration-none">
          <i class="bi bi-cart3"></i>
          <span class="cart-badge" id="cartBadge">0</span>
          <span>Cart</span>
        </a>

        <!-- Back link (mobile) -->
        <a href="CustomerHomePage.html"
           class="nav-icon-btn d-md-none d-flex flex-column align-items-center text-decoration-none">
          <i class="bi bi-arrow-left"></i>
          <span>Home</span>
        </a>
      </div>
    </div>
  </div>
</header>

<!-- ===== WISHLIST DRAWER ===== -->
<div class="wishlist-drawer" id="wishlistDrawer">
  <div class="wishlist-drawer-header">
    <h5 class="mb-0 fw-800"><i class="bi bi-heart-fill text-danger me-2"></i>My Wishlist</h5>
    <button class="btn-close-drawer" id="closeWishlistDrawer"><i class="bi bi-x-lg"></i></button>
  </div>
  <div class="wishlist-drawer-body" id="wishlistDrawerBody"></div>
</div>
<div class="drawer-backdrop" id="drawerBackdrop"></div>

<!-- ===== PAGE HERO BANNER ===== -->
<section class="na-hero">
  <div class="container-fluid px-3 px-lg-4">
    <div class="na-hero-inner">
      <div class="na-hero-text">
        <span class="na-hero-badge"><i class="bi bi-stars me-1"></i>Just Landed</span>
        <h1 class="na-hero-title">New <span>Arrivals</span></h1>
        <p class="na-hero-sub">The freshest products added to DEALPORT — sorted newest first.</p>
      </div>
      <div class="na-hero-stats" id="naHeroStats">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>
</section>

<!-- ===== FILTER BAR ===== -->
<div class="na-filter-bar sticky-top" id="naFilterBar">
  <div class="container-fluid px-3 px-lg-4">
    <div class="na-filter-inner">

      <!-- Category pills -->
      <div class="na-filter-pills" id="naCategoryPills">
        <button class="na-pill active" data-cat="All">All</button>
        <!-- rest populated by JS -->
      </div>

      <!-- Sort & count -->
      <div class="na-filter-right">
        <span class="na-count" id="naCount">– products</span>
        <select class="form-select form-select-sm na-sort" id="naSort">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- ===== PRODUCTS GRID ===== -->
<main class="section-pad">
  <div class="container-fluid px-3 px-lg-4">
    <div class="row g-3" id="naGrid">
      <!-- skeleton shown by JS while loading -->
    </div>

    <!-- No results -->
    <div id="naEmpty" class="api-error-state d-none">
      <i class="bi bi-search"></i>
      <h4>No products found</h4>
      <p>Try a different category or search term.</p>
      <button class="btn btn-add-cart px-4" onclick="clearFilters()">
        <i class="bi bi-arrow-counterclockwise me-2"></i>Clear Filters
      </button>
    </div>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="site-footer-mini mt-auto">
  <div class="container-fluid px-3 px-lg-4">
    <div class="footer-mini-bottom">
      <p>© 2025 DEALPORT. All rights reserved.</p>
      <a href="CustomerHomePage.html" class="btn btn-outline-success btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back to Store
      </a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../../JS/Customer/NewArrivals.js"></script>
</body>
</html>
