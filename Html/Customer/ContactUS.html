<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body>
  <!-- Become Seller Button -->
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#becomeSellerModal">
    Become a Seller
  </button>

  <!-- Modal -->
  <div class="modal fade" id="becomeSellerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <i class="bi bi-shop"></i> Apply to Become a Seller
          </h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form id="becomeSellerForm" class="needs-validation" novalidate>
          <div class="modal-body">
            <!-- Store Information -->
            <h6 class="mb-3 fw-bold">Store Information</h6>

            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">Store Name *</label>
                <input type="text" class="form-control" id="storeName" required />
                <div class="invalid-feedback">Please enter store name.</div>
              </div>

              <div class="col-md-6">
                <label class="form-label">City *</label>
                <input type="text" class="form-control" id="storeCity" required />
                <div class="invalid-feedback">Please enter your city.</div>
              </div>

              <div class="col-12">
                <label class="form-label">Store Description *</label>
                <textarea class="form-control" id="storeDescription" rows="3" required></textarea>
                <div class="invalid-feedback">
                  Please describe your store.
                </div>
              </div>
            </div>

            <!-- Business Info -->
            <h6 class="mb-3 fw-bold">Business Information</h6>

            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label class="form-label">Business Category *</label>
                <select class="form-select" id="storeCategory" required>
                  <option selected disabled value="">Select Category</option>

                  <option>Electronics</option>
                  <option>Fashion</option>
                  <option>Home & Kitchen</option>
                  <option>Beauty</option>
                  <option>Sports</option>
                </select>

                <div class="invalid-feedback">Please choose category.</div>
              </div>

              <div class="col-md-6">
                <label class="form-label">Phone Number *</label>
                <input type="tel" class="form-control" id="storePhone" required />

                <div class="invalid-feedback">Enter phone number.</div>
              </div>
            </div>

            <!-- Payout Method -->
            <h6 class="mb-3 fw-bold">Payout Preferences</h6>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Payment Method *</label>

                <select class="form-select" id="paymentMethod" required>
                  <option value="" disabled selected>Select method</option>

                  <option>Bank Transfer</option>
                  <option>Vodafone Cash</option>
                  <option>InstaPay</option>
                  <option>PayPal</option>
                </select>

                <div class="invalid-feedback">Select payment method.</div>
              </div>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">
              Cancel
            </button>

            <button class="btn btn-success" type="submit">
              Submit Application
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../../Libraries/JQuery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { addCustomerToSeller, getCurrentUser } from "../../JS/Core/Auth.js";

    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("becomeSellerForm");

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        if (!form.checkValidity()) {
          event.stopPropagation();
          form.classList.add("was-validated");
          return;
        }

        // Collect form data (correct IDs)
        const sellerRequest = {
          storeName: document.getElementById("storeName").value.trim(),
          city: document.getElementById("storeCity").value.trim(),
          description: document
            .getElementById("storeDescription")
            .value.trim(),
          category: document.getElementById("storeCategory").value,
          phone: document.getElementById("storePhone").value.trim(),
          paymentMethod: document.getElementById("paymentMethod").value,
        };

        console.log("Seller Request:", sellerRequest);

        // get logged-in user
        const currentUser = getCurrentUser();

        if (!currentUser) {
          alert("You must be logged in first.");
          return;
        }

        const result = addCustomerToSeller(currentUser.id, sellerRequest);

        if (!result.success) {
          alert(result.error);
          return;
        }

        // Reset form
        form.reset();
        form.classList.remove("was-validated");

        // Close modal
        const modal = bootstrap.Modal.getInstance(
          document.getElementById("becomeSellerModal"),
        );
        modal.hide();

        alert("Your seller application has been submitted!");
      });
    });
  </script>
</body>

</html>
