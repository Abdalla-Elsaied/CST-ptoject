<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Category – DEALPORT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../CSS/Customer/CustomerHomePage.css"/>
  <link rel="stylesheet" href="../../CSS/Customer/categoryProducts.css"/>
</head>
<body>

<!-- ===== MINI NAVBAR ===== -->
<header class="navbar-top sticky-top">
  <div class="container-fluid px-3 px-lg-4">
    <div class="d-flex align-items-center gap-3 gap-lg-4 py-2">

      <!-- Logo -->
      <a href="CustomerHomePage.html" class="logo-brand text-decoration-none flex-shrink-0">
        <span class="logo-deal">DEAL</span><span class="logo-port"><i class="bi bi-shop"></i>RT</span>
      </a>

      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="d-none d-md-block flex-grow-1">
        <ol class="breadcrumb mb-0 small">
          <li class="breadcrumb-item">
            <a href="CustomerHomePage.html" class="text-success text-decoration-none">Home</a>
          </li>
          <li class="breadcrumb-item active" id="bcCategoryName">Loading...</li>
        </ol>
      </nav>

      <!-- Search (inline) -->
      <div class="search-wrapper d-none d-lg-flex flex-grow-1" style="max-width:400px">
        <div class="input-group search-group">
          <input type="text" class="form-control search-input" id="catSearchInput"
                 placeholder="Search in this category..."/>
          <button class="btn btn-search" id="catSearchBtn">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </div>

      <!-- Right icons -->
      <div class="nav-icons d-flex align-items-center gap-2 gap-lg-3 flex-shrink-0">
        <a href="CustomerHomePage.html" class="nav-icon-btn d-flex align-items-center gap-1 text-decoration-none">
          <i class="bi bi-arrow-left"></i><span class="d-none d-sm-inline">Back</span>
        </a>
        <a href="Cart.html" class="nav-icon-btn d-flex flex-column align-items-center position-relative text-decoration-none">
          <i class="bi bi-cart3"></i>
          <span class="cart-badge" id="cartBadge">0</span>
          <span>Cart</span>
        </a>
        <div class="dropdown">
          <button class="nav-icon-btn d-none d-md-flex flex-column align-items-center border-0 bg-transparent"
                  id="accountNavBtn" data-bs-toggle="dropdown" title="Account">
            <i class="bi bi-person"></i>
            <span id="accountNavLabel">Account</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end account-dropdown" id="accountDropdownMenu"></ul>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ===== PAGE HEADER ===== -->
<div class="cat-page-header">
  <div class="container-fluid px-3 px-lg-4">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h1 class="cat-page-title" id="catPageTitle">Loading...</h1>
        <p class="cat-page-sub" id="catPageSub">Fetching products...</p>
      </div>
      <!-- Sort -->
      <div class="d-flex align-items-center gap-2">
        <label class="small fw-700 text-secondary">Sort by:</label>
        <select class="form-select form-select-sm cat-sort-select" id="catSortSelect" style="min-width:160px">
          <option value="default">Default</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="rating-desc">Highest Rated</option>
          <option value="name-asc">Name A–Z</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="catLoading" class="cat-loading-wrap">
  <div class="spinner-border text-success" role="status"></div>
  <p class="mt-3 text-muted">Loading products...</p>
</div>

<!-- ===== NO RESULTS ===== -->
<div id="catNoResults" class="cat-empty-wrap d-none">
  <i class="bi bi-search fs-1 text-muted d-block mb-3"></i>
  <h5>No products found</h5>
  <p class="text-muted small">Try adjusting your search or browse other categories.</p>
  <a href="CustomerHomePage.html" class="btn btn-add-cart mt-2 px-4">Back to Home</a>
</div>

<!-- ===== PRODUCT GRID ===== -->
<main class="container-fluid px-3 px-lg-4 py-4" id="catMain" style="display:none">

  <!-- Mobile search -->
  <div class="d-lg-none mb-3">
    <div class="input-group search-group">
      <input type="text" class="form-control search-input" id="catSearchInputMobile"
             placeholder="Search in this category..."/>
      <button class="btn btn-search" id="catSearchBtnMobile"><i class="bi bi-search"></i></button>
    </div>
  </div>

  <div class="row g-3" id="catProductGrid">
    <!-- Populated by JS -->
  </div>

  <!-- No search results -->
  <div id="catSearchEmpty" class="cat-empty-wrap d-none" style="min-height:200px">
    <i class="bi bi-funnel fs-1 text-muted d-block mb-3"></i>
    <h6>No products match your search.</h6>
    <button class="btn btn-outline-success mt-2" id="clearCatSearch">Clear search</button>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../../JS/Customer/categoryProducts.js"></script>
</body>
</html>
