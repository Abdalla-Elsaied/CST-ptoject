<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | DEALPORT Admin</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/CSS/Customer/Login.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card card shadow-lg">

      <div class="card-body p-4 p-md-5">
        <h4 class="text-center mb-4 fw-semibold">Welcome Back</h4>

        <form id="loginForm" class="needs-validation" novalidate>
          <div class="form-floating mb-4">
            <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
            <label for="floatingEmail">Email address</label>
            <div class="invalid-feedback">Please provide a valid email.</div>
          </div>

          <div class="form-floating mb-4 position-relative">
            <input type="password" class="form-control pe-5" id="floatingPassword" placeholder="Password" required>
            <label for="floatingPassword">Password</label>
            <button type="button" class="btn btn-link position-absolute top-50 end-0 translate-middle-y pe-3" id="togglePassword">
              <i class="bi bi-eye fs-5"></i>
            </button>
            <div class="invalid-feedback">Password is required.</div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label small" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="text-teal small fw-medium text-decoration-none">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
            Sign In
          </button>
        </form>

        <!-- Optional social login -->
        <div class="divider my-4 text-muted small text-center">or continue with</div>

        <div class="row g-3">
          <div class="col-6">
            <button type="button" class="btn social-btn btn-outline-secondary w-100">
              <i class="bi bi-google me-2"></i> Google
            </button>
          </div>
          <div class="col-6">
            <button type="button" class="btn social-btn btn-outline-secondary w-100">
              <i class="bi bi-facebook me-2"></i> Facebook
            </button>
          </div>
        </div>

        <div class="text-center mt-4 small">
          Don't have an account? 
          <a href="register.html" class="text-teal fw-medium text-decoration-none">Sign up now</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/Libraries/JQuery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/JS/Customer/Login.js" type="module"></script>
</body>
</html>
