<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DEALPORT Admin</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/CSS/Customer/Login.css">
</head>

<body>
  
  <div class="login-wrapper">
 
    <!-- ── LEFT: Login Card ── -->
    <div class="login-card">
      <div class="card-body p-4 p-md-5">
        <h4 class="text-center mb-4 fw-semibold">Welcome Back</h4>
 
        <form id="loginForm" class="needs-validation" novalidate>
 
          <div class="form-floating mb-4">
            <input type="email" class="form-control" id="floatingEmail"
                   placeholder="name@example.com" required>
            <label for="floatingEmail">Email address</label>
            <div class="invalid-feedback">Please provide a valid email.</div>
          </div>
 
          <div class="form-floating mb-4 position-relative">
            <input type="password" class="form-control pe-5"
                   id="floatingPassword" placeholder="Password" required>
            <label for="floatingPassword">Password</label>
            <button type="button"
                    class="btn btn-link position-absolute top-50 end-0 translate-middle-y pe-3"
                    id="togglePassword" style="z-index:5; color:#94a3b8;">
              <i class="bi bi-eye fs-5" id="eyeIcon"></i>
            </button>
            <div class="invalid-feedback">Password is required.</div>
          </div>
 
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe"/>
              <label class="form-check-label small" for="rememberMe">Remember me</label>
            </div>
            <a href="#" class="text-teal small fw-medium text-decoration-none">Forgot password?</a>
          </div>
 
          <button type="submit" class="btn btn-primary w-100 py-3 fw-semibold">
            Sign In
          </button>
        </form>
 
        <div class="text-center mt-4 small">
          Don't have an account?
          <a href="register.html" class="text-teal fw-medium text-decoration-none">Sign up now</a>
        </div>
      </div>
    </div>
 
    <!-- ── RIGHT: Image Panel ── -->
    <div class="image-panel">
      <!--
        Replace src with your actual path, e.g.:
        src="../../Images/Gemini_Generated_Image_47rlmn47rlmn47rl.png"
        The onerror will show the SVG cart if the path is broken.
      -->
      <img
        src="../../Images/Gemini_Generated_Image_47rlmn47rlmn47rl.png"
        alt="Shopping illustration"
        onerror="this.style.display='none';
                 document.getElementById('cartFallback').style.display='block';"
      />
 
      <!-- SVG cart shown when image path is broken -->
      <div class="cart-fallback" id="cartFallback" style="display:none;">
        <svg viewBox="0 0 220 190" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 18 Q8 8 20 8 H38 L58 108 H178 L196 48 H68"
                stroke="white" stroke-width="10"
                stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <rect x="58" y="48" width="138" height="62" rx="4"
                stroke="white" stroke-width="9" fill="none"/>
          <line x1="97"  y1="48" x2="97"  y2="110" stroke="white" stroke-width="5"/>
          <line x1="128" y1="48" x2="128" y2="110" stroke="white" stroke-width="5"/>
          <line x1="159" y1="48" x2="159" y2="110" stroke="white" stroke-width="5"/>
          <line x1="58"  y1="73" x2="196" y2="73"  stroke="white" stroke-width="5"/>
          <line x1="58"  y1="91" x2="196" y2="91"  stroke="white" stroke-width="5"/>
          <circle cx="88"  cy="138" r="14" stroke="white" stroke-width="9" fill="none"/>
          <circle cx="172" cy="138" r="14" stroke="white" stroke-width="9" fill="none"/>
        </svg>
        <p>Shop smarter today</p>
      </div>
    </div>
 
  </div>

  <!-- Scripts -->
  <script src="/Libraries/JQuery.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/JS/Customer/Login.js" type="module"></script>
</body>

</html>
